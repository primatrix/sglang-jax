# CI sglang-jax Job (16 chips) - K8s Manifests
# 4 pods x 4 TPU chips = 16 chips, topology 4x4
# Rendered by envsubst with:
#   $JOB_NAME $BRANCH $SERVER_ARGS $TASK_COMMAND_B64
#   $TASK_TYPE $GITHUB_ACTOR $ACTIVE_DEADLINE
#   $TPU_COORDINATOR_ADDRESS $EXTRA_DEPS
#   $RESULTS_PATH $GITHUB_RUN_NUMBER $TOPOLOGY
---
# Headless Service for TPU pod DNS resolution (required for JAX multi-host)
apiVersion: v1
kind: Service
metadata:
  name: ${JOB_NAME}-headless-svc
  namespace: default
  labels:
    app: ci-sglang
spec:
  clusterIP: None
  selector:
    job-name: ${JOB_NAME}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  namespace: default
  labels:
    app: ci-sglang
    ci-actor: ${GITHUB_ACTOR}
    ci-task: ${TASK_TYPE}
    job-name: ${JOB_NAME}
spec:
  backoffLimit: 0
  completionMode: Indexed
  completions: 4
  parallelism: 4
  podReplacementPolicy: TerminatingOrFailed
  activeDeadlineSeconds: ${ACTIVE_DEADLINE}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
      labels:
        app: ci-sglang
        job-name: ${JOB_NAME}
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                job-name: ${JOB_NAME}
            topologyKey: cloud.google.com/gke-nodepool
      containers:
      - name: sglang-tpu
        image: python:3.12
        imagePullPolicy: IfNotPresent
        command:
        - bash
        - -c
        - |
          set -ex

          # 0. Write metadata save script
          printf '%s\n' 'import json, os, datetime' \
            'meta = {' \
            '    "run_number": os.environ.get("GITHUB_RUN_NUMBER", ""),' \
            '    "branch": os.environ.get("BRANCH", ""),' \
            '    "topology": os.environ.get("TOPOLOGY", ""),' \
            '    "server_args": os.environ.get("SERVER_ARGS", ""),' \
            '    "task_command": os.environ.get("TASK_COMMAND_B64", ""),' \
            '    "task_type": os.environ.get("TASK_TYPE", ""),' \
            '    "timestamp": datetime.datetime.utcnow().isoformat() + "Z",' \
            '    "exit_code": int(os.environ.get("TASK_EXIT_VAL", "-1"))' \
            '}' \
            'with open(os.environ["RESULTS_PATH"] + "/metadata.json", "w") as f:' \
            '    json.dump(meta, f, indent=2)' \
            'print("Results saved to: " + os.environ["RESULTS_PATH"])' \
            > /tmp/save_metadata.py

          # 1. Clone branch
          set +x
          git clone --depth=1 --branch="${BRANCH}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/primatrix/sglang-jax.git" \
            /root/sglang-jax
          set -x
          cd /root/sglang-jax

          # 2. Setup Python environment
          pip install uv
          uv venv /tmp/venv
          source /tmp/venv/bin/activate
          uv pip install pip
          uv pip install -e "python[tpu]"

          # 3. Install extra deps if specified
          if [ -n "${EXTRA_DEPS}" ]; then
            uv pip install ${EXTRA_DEPS}
          fi

          # 4. Determine node rank from JOB_COMPLETION_INDEX
          NODE_RANK=${JOB_COMPLETION_INDEX}
          NNODES=4
          COORDINATOR_ADDR="${TPU_COORDINATOR_ADDRESS}"

          echo "Node rank: ${NODE_RANK}, Coordinator: ${COORDINATOR_ADDR}"

          # 5. Start sglang server
          #    - Node 0 runs full stack (HTTP + scheduler)
          #    - Nodes 1-3 run scheduler only
          python -u -m sgl_jax.launch_server \
            --host 0.0.0.0 \
            --port 30271 \
            --nnodes ${NNODES} \
            --node-rank ${NODE_RANK} \
            --dist-init-addr "${COORDINATOR_ADDR}" \
            ${SERVER_ARGS} &
          SERVER_PID=$!

          if [ "${NODE_RANK}" -eq 0 ]; then
            # 6. Coordinator: wait for server ready, run task
            echo "Waiting for server to be ready..."
            for i in $(seq 1 120); do
              if curl -sf http://127.0.0.1:30271/health > /dev/null 2>&1; then
                echo "Server is ready after ${i}0 seconds"
                break
              fi
              if ! kill -0 $SERVER_PID 2>/dev/null; then
                echo "ERROR: Server process died"
                exit 1
              fi
              sleep 10
            done

            if ! curl -sf http://127.0.0.1:30271/health > /dev/null 2>&1; then
              echo "ERROR: Server failed to start within 1200s"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi

            # Decode and run the task command
            TASK_CMD=$(echo "$TASK_COMMAND_B64" | base64 -d)
            echo "Running: $TASK_CMD"
            set +e
            eval "$TASK_CMD" 2>&1 | tee /tmp/task_output.txt
            TASK_EXIT=${PIPESTATUS[0]}
            set -e

            # Save results to GCS if RESULTS_PATH is set
            if [ -n "${RESULTS_PATH}" ]; then
              mkdir -p "${RESULTS_PATH}"
              cp /tmp/task_output.txt "${RESULTS_PATH}/output.txt"
              export TASK_EXIT_VAL=$TASK_EXIT
              python3 /tmp/save_metadata.py
            fi

            # Shutdown server
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
            exit $TASK_EXIT
          else
            # 7. Worker: wait for server, force-exit if hung
            set +e
            wait $SERVER_PID
            exit 0
          fi
        env:
        - name: SERVER_ARGS
          value: "${SERVER_ARGS}"
        - name: EXTRA_DEPS
          value: "${EXTRA_DEPS}"
        - name: TASK_COMMAND_B64
          value: "${TASK_COMMAND_B64}"
        - name: TASK_TYPE
          value: "${TASK_TYPE}"
        - name: BRANCH
          value: "${BRANCH}"
        - name: RESULTS_PATH
          value: "${RESULTS_PATH}"
        - name: GITHUB_RUN_NUMBER
          value: "${GITHUB_RUN_NUMBER}"
        - name: TOPOLOGY
          value: "${TOPOLOGY}"
        - name: TPU_COORDINATOR_ADDRESS
          value: "${TPU_COORDINATOR_ADDRESS}"
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: ${JOB_NAME}-token
              key: token
        - name: JAX_COMPILATION_CACHE_DIR
          value: /tmp/jit_cache
        resources:
          limits:
            google.com/tpu: "4"
          requests:
            ephemeral-storage: 20Gi
            google.com/tpu: "4"
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /inference-models
          name: model-storage
        - mountPath: /dev/shm
          name: dev-shm
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
        cloud.google.com/gke-tpu-topology: "4x4"
      restartPolicy: Never
      serviceAccountName: gcs-account
      subdomain: ${JOB_NAME}-headless-svc
      terminationGracePeriodSeconds: 30
      volumes:
      - emptyDir:
          medium: Memory
        name: gke-gcsfuse-cache
      - name: model-storage
        persistentVolumeClaim:
          claimName: inference-model-storage-poc-tpu-hns-pvc
      - name: dev-shm
        emptyDir:
          medium: Memory
